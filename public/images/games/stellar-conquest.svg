<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#0D0630"/>
      <stop offset="60%"  stop-color="#05020F"/>
      <stop offset="100%" stop-color="#020108"/>
    </radialGradient>
    <radialGradient id="nebula" cx="30%" cy="35%" r="50%">
      <stop offset="0%"   stop-color="#7B2FFF" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#2979FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="60%" r="40%">
      <stop offset="0%"   stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="planet" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1A3A7A"/>
      <stop offset="60%"  stop-color="#0A1A4A"/>
      <stop offset="100%" stop-color="#050A20"/>
    </radialGradient>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="60%">
      <stop offset="70%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#2979FF" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00E5FF" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#7B2FFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.5"/>
      <stop offset="30%"  stop-color="transparent"/>
      <stop offset="70%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="8"/></filter>
    <clipPath id="planetClip"><circle cx="400" cy="320" r="180"/></clipPath>
  </defs>

  <!-- Deep space bg -->
  <rect width="800" height="450" fill="url(#space)"/>
  <rect width="800" height="450" fill="url(#nebula)"/>
  <rect width="800" height="450" fill="url(#nebula2)"/>

  <!-- Star field -->
  <g fill="white">
    <circle cx="50"  cy="30"  r="1"   opacity="0.9"/>
    <circle cx="120" cy="80"  r="1.5" opacity="0.7"/>
    <circle cx="200" cy="20"  r="1"   opacity="0.8"/>
    <circle cx="280" cy="60"  r="0.8" opacity="0.6"/>
    <circle cx="350" cy="15"  r="1.2" opacity="0.9"/>
    <circle cx="430" cy="45"  r="1"   opacity="0.7"/>
    <circle cx="510" cy="25"  r="1.5" opacity="0.8"/>
    <circle cx="600" cy="70"  r="1"   opacity="0.6"/>
    <circle cx="680" cy="30"  r="1.2" opacity="0.9"/>
    <circle cx="750" cy="55"  r="0.8" opacity="0.7"/>
    <circle cx="90"  cy="130" r="1"   opacity="0.5"/>
    <circle cx="170" cy="150" r="1.5" opacity="0.6"/>
    <circle cx="320" cy="100" r="0.8" opacity="0.7"/>
    <circle cx="460" cy="110" r="1"   opacity="0.5"/>
    <circle cx="560" cy="130" r="1.2" opacity="0.6"/>
    <circle cx="640" cy="110" r="1"   opacity="0.7"/>
    <circle cx="720" cy="140" r="1.5" opacity="0.5"/>
    <circle cx="30"  cy="200" r="1"   opacity="0.4"/>
    <circle cx="140" cy="220" r="0.8" opacity="0.5"/>
    <circle cx="700" cy="190" r="1"   opacity="0.4"/>
    <circle cx="780" cy="210" r="1.2" opacity="0.5"/>
  </g>

  <!-- Constellation lines -->
  <g stroke="#2979FF" stroke-width="0.5" opacity="0.25" fill="none">
    <polyline points="120,80 200,20 280,60 350,15"/>
    <polyline points="510,25 600,70 680,30 750,55"/>
    <circle cx="200" cy="20"  r="2.5" fill="#2979FF" opacity="0.4"/>
    <circle cx="600" cy="70"  r="2.5" fill="#2979FF" opacity="0.4"/>
    <circle cx="680" cy="30"  r="2"   fill="#2979FF" opacity="0.3"/>
  </g>

  <!-- Planet body (partially off bottom) -->
  <circle cx="400" cy="340" r="180" fill="url(#planet)"/>
  <!-- Planet surface detail lines -->
  <g clip-path="url(#planetClip)" fill="none" stroke="#1E4A9A" stroke-width="1" opacity="0.4">
    <ellipse cx="400" cy="340" rx="180" ry="40"/>
    <ellipse cx="400" cy="340" rx="160" ry="30"/>
    <ellipse cx="400" cy="295" rx="140" ry="20"/>
    <ellipse cx="400" cy="310" rx="170" ry="25"/>
  </g>
  <!-- Planet glow ring -->
  <circle cx="400" cy="340" r="180" fill="url(#planetGlow)"/>

  <!-- Planetary rings (ellipses) -->
  <ellipse cx="400" cy="280" rx="260" ry="35" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.8"/>
  <ellipse cx="400" cy="280" rx="240" ry="30" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>

  <!-- Small moon -->
  <circle cx="620" cy="120" r="22" fill="#0A1530"/>
  <circle cx="620" cy="120" r="22" fill="none" stroke="#2979FF" stroke-width="1" opacity="0.4"/>
  <circle cx="612" cy="114" r="4"  fill="#152040" opacity="0.8"/>
  <circle cx="625" cy="124" r="3"  fill="#152040" opacity="0.6"/>

  <!-- Fleet dots (small ships) -->
  <g fill="#00E5FF" filter="url(#glow)">
    <polygon points="155,180 160,170 165,180" opacity="0.8"/>
    <polygon points="175,160 179,152 183,160" opacity="0.6"/>
    <polygon points="190,175 194,167 198,175" opacity="0.7"/>
  </g>

  <!-- Vignette -->
  <rect width="800" height="450" fill="url(#vignette)"/>

  <!-- Genre label -->
  <text x="24" y="424" font-family="monospace" font-size="11" fill="#00E5FF" opacity="0.8" letter-spacing="3">STRATEGY  //  SCI-FI  //  4X</text>
</svg>
