<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05010F"/>
      <stop offset="100%" stop-color="#0A0520"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2D9B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF2D9B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2979FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2979FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2979FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#FF2D9B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2979FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#blueGlow)"/>

  <!-- Perspective floor grid -->
  <!-- Horizontal lines converging to vanishing point at 400,260 -->
  <g opacity="0.35" stroke="#FF2D9B" stroke-width="0.5">
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="50" y1="400" x2="750" y2="400"/>
    <line x1="120" y1="360" x2="680" y2="360"/>
    <line x1="180" y1="330" x2="620" y2="330"/>
    <line x1="230" y1="308" x2="570" y2="308"/>
    <line x1="270" y1="290" x2="530" y2="290"/>
    <line x1="300" y1="276" x2="500" y2="276"/>
    <line x1="325" y1="266" x2="475" y2="266"/>
  </g>
  <!-- Vertical lines -->
  <g opacity="0.35" stroke="#FF2D9B" stroke-width="0.5">
    <line x1="400" y1="260" x2="0"   y2="450"/>
    <line x1="400" y1="260" x2="100" y2="450"/>
    <line x1="400" y1="260" x2="200" y2="450"/>
    <line x1="400" y1="260" x2="300" y2="450"/>
    <line x1="400" y1="260" x2="400" y2="450"/>
    <line x1="400" y1="260" x2="500" y2="450"/>
    <line x1="400" y1="260" x2="600" y2="450"/>
    <line x1="400" y1="260" x2="700" y2="450"/>
    <line x1="400" y1="260" x2="800" y2="450"/>
  </g>

  <!-- Neon glow on floor -->
  <rect x="0" y="260" width="800" height="190" fill="url(#floor)"/>
  <rect x="0" y="258" width="800" height="4" fill="url(#glowL)" filter="url(#blur6)"/>

  <!-- City skyline silhouette -->
  <g fill="#0D0620" opacity="0.9">
    <rect x="0"   y="120" width="60"  height="140"/>
    <rect x="30"  y="80"  width="40"  height="180"/>
    <rect x="80"  y="100" width="50"  height="160"/>
    <rect x="140" y="60"  width="30"  height="200"/>
    <rect x="160" y="90"  width="60"  height="170"/>
    <rect x="600" y="90"  width="60"  height="170"/>
    <rect x="640" y="60"  width="30"  height="200"/>
    <rect x="680" y="100" width="50"  height="160"/>
    <rect x="720" y="80"  width="40"  height="180"/>
    <rect x="750" y="120" width="50"  height="140"/>
  </g>

  <!-- Building window lights -->
  <g fill="#FF2D9B" opacity="0.5">
    <rect x="35"  y="90"  width="5" height="5"/>
    <rect x="45"  y="100" width="5" height="5"/>
    <rect x="35"  y="110" width="5" height="5"/>
    <rect x="145" y="75"  width="4" height="4"/>
    <rect x="155" y="85"  width="4" height="4"/>
    <rect x="615" y="100" width="5" height="5"/>
    <rect x="630" y="80"  width="4" height="4"/>
    <rect x="730" y="90"  width="5" height="5"/>
    <rect x="745" y="100" width="5" height="5"/>
  </g>
  <g fill="#2979FF" opacity="0.5">
    <rect x="90"  y="110" width="5" height="5"/>
    <rect x="100" y="125" width="5" height="5"/>
    <rect x="170" y="100" width="5" height="5"/>
    <rect x="185" y="115" width="5" height="5"/>
    <rect x="690" y="115" width="5" height="5"/>
    <rect x="705" y="130" width="5" height="5"/>
    <rect x="760" y="130" width="5" height="5"/>
  </g>

  <!-- Circuit lines top area -->
  <g stroke="#2979FF" stroke-width="1" fill="none" opacity="0.2">
    <polyline points="0,40 80,40 100,60 180,60 200,40 300,40"/>
    <polyline points="800,30 700,30 680,50 600,50 580,30 500,30"/>
    <circle cx="180" cy="60" r="4" fill="#2979FF" opacity="0.4"/>
    <circle cx="600" cy="50" r="4" fill="#2979FF" opacity="0.4"/>
  </g>

  <!-- Central glow -->
  <rect width="800" height="450" fill="url(#coreGlow)"/>

  <!-- Floating particles -->
  <g fill="#FF2D9B">
    <circle cx="150" cy="200" r="1.5" opacity="0.7"/>
    <circle cx="200" cy="150" r="1"   opacity="0.5"/>
    <circle cx="350" cy="180" r="2"   opacity="0.8"/>
    <circle cx="500" cy="140" r="1.5" opacity="0.6"/>
    <circle cx="620" cy="190" r="1"   opacity="0.5"/>
    <circle cx="700" cy="160" r="2"   opacity="0.7"/>
  </g>
  <g fill="#2979FF">
    <circle cx="120" cy="170" r="1.5" opacity="0.6"/>
    <circle cx="270" cy="130" r="1"   opacity="0.5"/>
    <circle cx="450" cy="160" r="2"   opacity="0.7"/>
    <circle cx="580" cy="170" r="1.5" opacity="0.6"/>
    <circle cx="660" cy="210" r="1"   opacity="0.5"/>
  </g>

  <!-- Horizontal neon scan line -->
  <rect x="0" y="200" width="800" height="1" fill="url(#glowL)" opacity="0.4"/>

  <!-- Vignette + bottom text fade -->
  <rect width="800" height="450" fill="url(#vignette)"/>

  <!-- Genre label -->
  <text x="24" y="424" font-family="monospace" font-size="11" fill="#FF2D9B" opacity="0.8" letter-spacing="3">ACTION RPG  //  CYBERPUNK</text>
</svg>
