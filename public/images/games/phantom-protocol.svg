<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%"   stop-color="#020805"/>
      <stop offset="100%" stop-color="#010402"/>
    </linearGradient>
    <radialGradient id="scopeGlow" cx="50%" cy="45%" r="30%">
      <stop offset="0%"   stop-color="#00FF41" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="scanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0A4020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="transparent"/>
      <stop offset="65%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="green-glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#scanGlow)"/>
  <rect width="800" height="450" fill="url(#scopeGlow)"/>

  <!-- Tactical grid (perspective) -->
  <g stroke="#00FF41" stroke-width="0.4" opacity="0.08">
    <!-- Horizontal -->
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <!-- Vertical -->
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Soldier silhouettes -->
  <!-- Soldier 1 - left, crouching behind cover -->
  <g fill="#030C06" opacity="0.95" transform="translate(120,240)">
    <!-- Cover block -->
    <rect x="-30" y="40" width="80" height="40" rx="2"/>
    <!-- Body -->
    <polygon points="-10,-10 10,-10 15,40 -15,40"/>
    <!-- Head with helmet -->
    <circle cx="0" cy="-22" r="16"/>
    <rect x="-16" y="-32" width="32" height="14" rx="3"/>
    <!-- Rifle -->
    <rect x="10" y="-5" width="55" height="6" rx="1"/>
    <rect x="55" y="-8" width="15" height="12" rx="1"/>
  </g>

  <!-- Soldier 2 - center-right, standing -->
  <g fill="#030C06" opacity="0.9" transform="translate(520,180)">
    <!-- Body -->
    <polygon points="-12,0 12,0 15,80 -15,80"/>
    <!-- Head -->
    <circle cx="0" cy="-14" r="18"/>
    <rect x="-18" y="-26" width="36" height="15" rx="3"/>
    <!-- Rifle raised -->
    <rect x="12" y="-10" width="60" height="7" rx="1" transform="rotate(-15,12,-10)"/>
    <!-- Legs -->
    <polygon points="-15,80 -5,80 -8,130 -20,130"/>
    <polygon points="5,80  15,80  18,130  4,130"/>
    <!-- Tactical vest detail -->
    <rect x="-10" y="10" width="20" height="25" rx="1" fill="#041208" opacity="0.6"/>
  </g>

  <!-- Scope / crosshair reticle (center) -->
  <g transform="translate(400,220)" filter="url(#green-glow)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.5"/>
    <!-- Inner circles -->
    <circle cx="0" cy="0" r="70"  fill="none" stroke="#00FF41" stroke-width="1"   opacity="0.4"/>
    <circle cx="0" cy="0" r="40"  fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="8"   fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.8"/>

    <!-- Crosshair lines -->
    <line x1="-100" y1="0"  x2="-50" y2="0"  stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
    <line x1="50"   y1="0"  x2="100" y2="0"  stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
    <line x1="0"  y1="-100" x2="0"  y2="-50" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>
    <line x1="0"   y1="50"  x2="0"  y2="100" stroke="#00FF41" stroke-width="1.5" opacity="0.7"/>

    <!-- Range marks on circle -->
    <line x1="-70" y1="-10" x2="-70" y2="10" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <line x1="70"  y1="-10" x2="70"  y2="10" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <line x1="-10" y1="-70" x2="10"  y2="-70" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
    <line x1="-10" y1="70"  x2="10"  y2="70"  stroke="#00FF41" stroke-width="1" opacity="0.5"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#00FF41" opacity="0.9"/>

    <!-- Corner brackets -->
    <polyline points="-100,-100 -100,-80 -80,-80" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.6"/>
    <polyline points="80,-80 100,-80 100,-100"    fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.6"/>
    <polyline points="-100,80 -100,100 -80,100"   fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.6"/>
    <polyline points="80,100 100,100 100,80"       fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- HUD data readouts -->
  <g font-family="monospace" font-size="10" fill="#00FF41" opacity="0.65">
    <text x="30"  y="50">UNIT-01: ACTIVE</text>
    <text x="30"  y="65">AMMO: 28/96</text>
    <text x="30"  y="80">HEALTH: ████░</text>
    <text x="600" y="50">SECTOR: B-7</text>
    <text x="600" y="65">THREAT: HIGH</text>
    <text x="600" y="80">MISSION: EXTRACT</text>
    <text x="30"  y="400">RANGE: 347m</text>
    <text x="620" y="400">WIND: 12 km/h NE</text>
  </g>

  <!-- Scan line animation suggestion (static) -->
  <rect x="0" y="180" width="800" height="1" fill="#00FF41" opacity="0.07"/>
  <rect x="0" y="260" width="800" height="1" fill="#00FF41" opacity="0.05"/>

  <!-- Vignette -->
  <rect width="800" height="450" fill="url(#vignette)"/>

  <!-- Genre label -->
  <text x="24" y="424" font-family="monospace" font-size="11" fill="#00FF41" opacity="0.8" letter-spacing="3">TACTICAL SHOOTER  //  SQUAD  //  REALISTIC</text>
</svg>
