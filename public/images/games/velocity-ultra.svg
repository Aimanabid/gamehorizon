<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#100400"/>
      <stop offset="100%" stop-color="#050100"/>
    </linearGradient>
    <radialGradient id="trackGlow" cx="50%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.3"/>
      <stop offset="60%"  stop-color="#FF2D00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="carGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="speedLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="50%"  stop-color="#CC4400"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A0800"/>
      <stop offset="100%" stop-color="#0A0300"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.5"/>
      <stop offset="30%"  stop-color="transparent"/>
      <stop offset="65%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#trackGlow)"/>

  <!-- Horizon glow -->
  <rect x="0" y="220" width="800" height="3" fill="url(#speedLine)" opacity="0.6" filter="url(#blur3)"/>
  <rect x="0" y="220" width="800" height="1" fill="#FFD700" opacity="0.5"/>

  <!-- Road surface -->
  <polygon points="180,450 320,225 480,225 620,450" fill="url(#road)" opacity="0.9"/>
  <!-- Road markings -->
  <g fill="#FF6B00" opacity="0.2">
    <rect x="393" y="270" width="14" height="30" rx="2"/>
    <rect x="393" y="320" width="14" height="30" rx="2"/>
    <rect x="393" y="370" width="14" height="30" rx="2"/>
    <rect x="393" y="420" width="14" height="30" rx="2"/>
  </g>

  <!-- Track edges glow -->
  <line x1="320" y1="225" x2="180" y2="450" stroke="#FF6B00" stroke-width="3" opacity="0.7" filter="url(#blur3)"/>
  <line x1="480" y1="225" x2="620" y2="450" stroke="#FF6B00" stroke-width="3" opacity="0.7" filter="url(#blur3)"/>
  <line x1="320" y1="225" x2="180" y2="450" stroke="#FFD700" stroke-width="1" opacity="0.9"/>
  <line x1="480" y1="225" x2="620" y2="450" stroke="#FFD700" stroke-width="1" opacity="0.9"/>

  <!-- Speed lines (horizontal blur streaks) -->
  <g opacity="0.4" filter="url(#blur3)">
    <rect x="0"   y="195" width="250" height="1.5" fill="#FFD700"/>
    <rect x="0"   y="205" width="180" height="1"   fill="#FF6B00"/>
    <rect x="0"   y="215" width="280" height="1.5" fill="#FFD700"/>
    <rect x="0"   y="185" width="150" height="1"   fill="#FF6B00"/>
    <rect x="550" y="195" width="250" height="1.5" fill="#FFD700"/>
    <rect x="620" y="205" width="180" height="1"   fill="#FF6B00"/>
    <rect x="520" y="215" width="280" height="1.5" fill="#FFD700"/>
    <rect x="650" y="185" width="150" height="1"   fill="#FF6B00"/>
  </g>

  <!-- Car silhouette (futuristic low racer) -->
  <g transform="translate(400,285)">
    <!-- Car glow -->
    <ellipse cx="0" cy="20" rx="90" ry="20" fill="#FF6B00" opacity="0.2" filter="url(#blur8)"/>
    <!-- Shadow -->
    <ellipse cx="0" cy="30" rx="80" ry="8" fill="#000" opacity="0.5"/>
    <!-- Body -->
    <polygon points="-80,20 -60,-5 -20,-20 20,-20 60,-5 80,20" fill="url(#carBody)"/>
    <!-- Cockpit -->
    <polygon points="-25,-20 -10,-38 10,-38 25,-20" fill="#FF8C00" opacity="0.7"/>
    <polygon points="-20,-20 -8,-35 8,-35 20,-20" fill="#FFD700" opacity="0.3"/>
    <!-- Wheels -->
    <ellipse cx="-55" cy="22" rx="20" ry="10" fill="#1A0800"/>
    <ellipse cx="-55" cy="22" rx="20" ry="10" fill="none" stroke="#FF6B00" stroke-width="2"/>
    <ellipse cx="55"  cy="22" rx="20" ry="10" fill="#1A0800"/>
    <ellipse cx="55"  cy="22" rx="20" ry="10" fill="none" stroke="#FF6B00" stroke-width="2"/>
    <!-- Headlights -->
    <circle cx="-72" cy="12" r="5" fill="#FFD700" opacity="0.9" filter="url(#blur3)"/>
    <circle cx="72"  cy="12" r="5" fill="#FFD700" opacity="0.9" filter="url(#blur3)"/>
    <!-- Underglow -->
    <rect x="-78" y="18" width="156" height="3" fill="#FF6B00" opacity="0.6" filter="url(#blur3)"/>
    <!-- Exhaust -->
    <rect x="-84" y="8" width="10" height="4" fill="#FF4400" opacity="0.8"/>
    <rect x="74"  y="8" width="10" height="4" fill="#FF4400" opacity="0.8"/>
  </g>

  <!-- Light trails from exhaust -->
  <g opacity="0.3" filter="url(#blur3)">
    <line x1="316" y1="293" x2="200" y2="293" stroke="#FF4400" stroke-width="3"/>
    <line x1="316" y1="293" x2="160" y2="300" stroke="#FF4400" stroke-width="2"/>
    <line x1="484" y1="293" x2="600" y2="293" stroke="#FF4400" stroke-width="3"/>
    <line x1="484" y1="293" x2="640" y2="300" stroke="#FF4400" stroke-width="2"/>
  </g>

  <!-- Speedometer HUD element (top right) -->
  <g opacity="0.6" transform="translate(640,60)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FF6B00" stroke-width="1.5" opacity="0.3"/>
    <path d="M-35,-20 A40,40 0 0,1 35,-20" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.8"/>
    <!-- Needle -->
    <line x1="0" y1="0" x2="28" y2="-28" stroke="#FFD700" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#FF6B00"/>
    <text x="-12" y="18" font-family="monospace" font-size="14" fill="#FFD700" opacity="0.9">487</text>
    <text x="-14" y="30" font-family="monospace" font-size="7"  fill="#FF6B00" opacity="0.7">KM/H</text>
  </g>

  <!-- Vignette -->
  <rect width="800" height="450" fill="url(#vignette)"/>

  <!-- Genre label -->
  <text x="24" y="424" font-family="monospace" font-size="11" fill="#FF6B00" opacity="0.8" letter-spacing="3">RACING  //  ANTI-GRAVITY  //  MULTIPLAYER</text>
</svg>
